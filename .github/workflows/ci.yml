name: CI VelibData

# Chaine d'automatisation demandee par le bloc 4 (compilation -> tests -> deploiement) :
#   1. lint-test    : analyse statique (flake8) + tests unitaires des regles de qualite (pytest)
#   2. validate-compose : verifie que docker-compose.yml (cluster Kafka/MinIO/Postgres/Spark)
#      est syntaxiquement valide et que les variables d'environnement s'interpolent correctement
#   3. validate-k8s : verifie que les manifests Kubernetes (mspr-tech/k8s/) sont valides
#      (dry-run côté client, sans necessiter de cluster reel) - etape "deploiement"
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: mspr-tech

jobs:
  lint-test:
    name: Lint + tests unitaires (regles de qualite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: mspr-tech/requirements-dev.txt

      - name: Installer les dependances
        run: pip install -r requirements-dev.txt

      - name: Analyse statique (flake8)
        run: flake8 --max-line-length=120 --extend-ignore=E203,W503 producers spark_jobs tests

      - name: Tests unitaires (pytest)
        run: pytest -v

  validate-compose:
    name: Valider docker-compose.yml (cluster Kafka/MinIO/Postgres/Spark)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preparer un .env de test
        run: cp .env.example .env

      - name: Valider la configuration Compose
        run: docker compose config --quiet

  validate-k8s:
    name: Valider les manifests Kubernetes (dry-run, etape deploiement)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Valider les manifests (schema Kubernetes)
        run: kubeconform -strict -summary k8s/*.yaml
