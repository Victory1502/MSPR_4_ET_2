# Cluster Kafka KRaft, 3 brokers - equivalent Kubernetes du cluster docker-compose (kafka-1/2/3).
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: velibdata
  labels:
    app: kafka
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9092
    - name: controller
      port: 19093
    - name: internal
      port: 29092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: velibdata
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail
              ORDINAL=${HOSTNAME##*-}
              export KAFKA_NODE_ID=$((ORDINAL + 1))
              export KAFKA_LISTENERS="PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:19093,INTERNAL://0.0.0.0:29092"
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://${HOSTNAME}.kafka-headless.velibdata.svc.cluster.local:9092,INTERNAL://${HOSTNAME}.kafka-headless.velibdata.svc.cluster.local:29092"
              exec /etc/confluent/docker/run
          envFrom:
            - configMapRef:
                name: kafka-common-config
          ports:
            - containerPort: 9092
              name: plaintext
            - containerPort: 19093
              name: controller
            - containerPort: 29092
              name: internal
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            exec:
              command: ["kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            exec:
              command: ["kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
