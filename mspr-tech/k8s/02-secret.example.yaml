# Gabarit (sur le modele de .env.example) : copier en 02-secret.yaml (ignore par git, cf. .gitignore),
# renseigner des valeurs reelles, puis kubectl apply -f 02-secret.yaml -- ne JAMAIS committer
# le fichier renseigne. Alternative recommandee en production : un gestionnaire de secrets
# externe (Sealed Secrets, Vault, SOPS) plutot qu'un Secret Kubernetes en clair.
apiVersion: v1
kind: Secret
metadata:
  name: velibdata-secrets
  namespace: velibdata
type: Opaque
stringData:
  MINIO_ROOT_USER: changeme_admin
  MINIO_ROOT_PASSWORD: changeme_password_min_12_caracteres
  POSTGRES_USER: changeme_pg_user
  POSTGRES_PASSWORD: changeme_pg_password
  POSTGRES_REPLICATOR_USER: replicator
  POSTGRES_REPLICATOR_PASSWORD: changeme_replicator_password
  GRAFANA_ADMIN_USER: admin
  GRAFANA_ADMIN_PASSWORD: changeme_grafana_password
